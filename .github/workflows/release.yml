name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          TARGETS="linux/amd64 linux/arm64 darwin/arm64"
          for target in $TARGETS; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            output="dist/coder-logger_${GOOS}_${GOARCH}"
            echo "Building ${GOOS}/${GOARCH}..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -o "$output" ./cmd/coder-logger
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
